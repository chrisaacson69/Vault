name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments, don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Eleventy
        env:
          # Repo is served at chrisaacson69.github.io/Vault/ — set the prefix to match.
          # If you add a custom domain (CNAME at repo root), change this to "/".
          PATH_PREFIX: /Vault/
        run: npx @11ty/eleventy

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
